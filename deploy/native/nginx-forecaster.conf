# /etc/nginx/sites-available/forecaster.secureinsights.ai
# Reverse-proxy for the forecaster, alongside any other sites on the host.
# Symlink into sites-enabled, `nginx -t`, reload, then run certbot (see deploy-native.md).
# certbot --nginx -d forecaster.secureinsights.ai will add the listen 443 / cert lines
# and the 80->443 redirect automatically.
server {
    listen 80;
    server_name forecaster.secureinsights.ai;

    location / {
        proxy_pass http://127.0.0.1:8900;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
        client_max_body_size 12m;
    }
}
