<!DOCTYPE html>
<html><head><meta charset="utf-8"><style>
body {
  width: 720pt; height: 405pt; margin: 0; padding: 0;
  font-family: Arial, sans-serif; display: flex; position: relative;
  background: #004D43; overflow: hidden;
}
.content { position: absolute; top: 60pt; left: 60pt; right: 60pt; bottom: 50pt; display: flex; flex-direction: column; justify-content: center; }
.line { width: 60pt; height: 4pt; background: #D4A84B; margin-bottom: 24pt; }
h1 { font-family: Arial, sans-serif; font-size: 36pt; font-weight: 700; color: #FFFFFF; margin: 0 0 8pt 0; letter-spacing: -0.5pt; line-height: 1.15; }
.subtitle { font-family: Arial, sans-serif; font-size: 16pt; font-weight: 400; color: rgba(255,255,255,0.8); margin: 0 0 32pt 0; line-height: 1.4; }
.bottom { position: absolute; bottom: 40pt; left: 60pt; right: 60pt; display: flex; justify-content: space-between; align-items: center; }
.kfc-tag { font-family: Arial, sans-serif; font-size: 9pt; font-weight: 700; color: #D4A84B; text-transform: uppercase; letter-spacing: 2pt; }
.date-tag { font-family: Arial, sans-serif; font-size: 9pt; font-weight: 400; color: rgba(255,255,255,0.6); }
</style></head><body>
<div class="content">
  <div class="line"></div>
  <h1>Faster Sales Anomaly<br>Detection & Forecasting</h1>
  <div class="subtitle">Reducing response time from 24&ndash;48 hours to near&ndash;real time across the KFC Vietnam chain</div>
</div>
<div class="bottom">
  <div class="kfc-tag">KFC Vietnam &bull; Operations &amp; Finance</div>
  <div class="date-tag">2025</div>
</div>
</body></html>
